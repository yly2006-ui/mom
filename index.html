<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给妈妈的母亲节礼物 🌸</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pbD+2VKuGyNdgMDMJ2Zp3aVhBw9mwtiHMji2GK/pP7vqC4l1RWt2+EkYvZ9XiyG8Iy6Cndv5qz3EO2hniA5s5g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- 花瓣飘落效果 -->
    <canvas id="petal-canvas"></canvas>

    <div class="container">
        <!-- 头部问候 -->
        <header class="header">
            <div class="heart">❤️</div>
            <h1>大妹，母亲节快乐！</h1>
            <p class="subtitle">杨礼跃用心做的小礼物，随时打开即可看到</p>
            <div id="clock" class="clock"></div>
        </header>

        <!-- 导航栏 -->
        <nav class="nav">
            <button class="nav-btn active" data-section="blessing"><i class="fas fa-gift"></i> 祝福</button>
            <button class="nav-btn" data-section="reminder"><i class="fas fa-bell"></i> 健康提醒</button>
            <button class="nav-btn" data-section="letter"><i class="fas fa-envelope"></i> 给妈妈的信</button>
            <button class="nav-btn" data-section="album"><i class="fas fa-camera"></i> 回忆相册</button>
        </nav>

        <!-- 主内容 -->
        <main class="content">
            <!-- 今日祝福 -->
            <section id="blessing" class="section active">
                <div class="card blessing-card">
                    <div class="icon">💝</div>
                    <h2>今日祝福</h2>
                    <p id="blessing-text" class="blessing-text">加载中...</p>
                    <button id="change-blessing" class="btn-small">换一句</button>
                </div>
            </section>

            <!-- 健康提醒 -->
            <section id="reminder" class="section">
                <div class="card">
                    <h2>⏰ 健康小助手</h2>
                    <p class="section-desc">点击下面的按钮，设置周期性提醒，手机会弹出通知。</p>
                    <div class="reminder-list">
                        <div class="reminder-item" data-type="water">
                            <i class="fas fa-tint"></i>
                            <span>喝水提醒（每60分钟）</span>
                            <button class="remind-btn" data-minutes="60">设置</button>
                        </div>
                        <div class="reminder-item" data-type="walk">
                            <i class="fas fa-walking"></i>
                            <span>散步提醒（每120分钟）</span>
                            <button class="remind-btn" data-minutes="120">设置</button>
                        </div>
                        <div class="reminder-item" data-type="rest">
                            <i class="fas fa-eye"></i>
                            <span>眼睛休息（每45分钟）</span>
                            <button class="remind-btn" data-minutes="45">设置</button>
                        </div>
                    </div>
                    <div id="active-reminders" class="active-reminders" style="display:none;">
                        <h3>已设提醒</h3>
                        <ul id="reminders-list"></ul>
                        <button id="clear-all" class="btn-small btn-danger">全部清除</button>
                    </div>
                </div>
            </section>

            <!-- 给妈妈的信 -->
            <section id="letter" class="section">
                <div class="card">
                    <h2>💌 给妈妈的一封信</h2>
                    <textarea id="letter-content" rows="6">
大妹，母亲节快乐！

这礼物做得挺简陋的，但都是我亲手弄的，你就凑合看吧哈哈。

平时你总操心这操心那，其实你自己也要多注意休息。
家里条件一直不错，都是你在打理，这点我确实挺佩服的。

以后少为我操点心，多花点时间做自己喜欢的事。

</textarea>
                    <div class="letter-actions">
                        <button id="save-letter" class="btn-primary">保存</button>
                        <button id="clear-letter" class="btn-secondary">清空</button>
                    </div>
                    <p id="save-msg" class="saved-msg" style="display:none;">已保存！</p>
                </div>
            </section>

            <!-- 回忆相册 -->
            <section id="album" class="section">
                <div class="card">
                    <h2>📷 我们的回忆</h2>
                    <p class="section-desc">点击图片可放大查看，左右滑动切换</p>
                    <div class="album-grid" id="album-grid">
                        <!-- 示例图片，实际可自行添加 -->
                        <div class="album-item" data-src="images/sample1.jpg" data-caption="和妈妈的第一次旅行">
                            <img src="images/sample1_thumb.jpg" alt="回忆1" />
                        </div>
                        <div class="album-item" data-src="images/sample2.jpg" data-caption="生日蛋糕">
                            <img src="images/sample2_thumb.jpg" alt="回忆2" />
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>❤️ 永远爱你的孩子 杨礼跃 · 2026 母亲节</p>
        </footer>
    </div>

    <!-- 照片查看弹窗 -->
    <div id="photo-viewer" class="photo-viewer" style="display:none;">
        <span class="viewer-close">&times;</span>
        <button class="viewer-nav viewer-prev">❮</button>
        <img id="viewer-img" src="" alt="" />
        <div id="viewer-caption" class="viewer-caption"></div>
        <button class="viewer-nav viewer-next">❯</button>
    </div>

    <!-- 背景音乐 -->
    <button id="music-toggle" class="music-btn" title="背景音乐">
        <i class="fas fa-music"></i>
    </button>
    <audio id="bg-music" loop preload="none">
        <source src="music/bgm.mp3" type="audio/mpeg">
    </audio>

    <script src="js/app.js"></script>
</body>
</html>
